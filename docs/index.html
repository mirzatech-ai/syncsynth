<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AiCineSynth — Visuals that move with the music</title>
<meta name="description" content="An audio-reactive visual engine. Drop a track or turn on your mic and watch hand-built WebGL worlds move to the sound. Full-screen, live, in the browser.">
<meta property="og:title" content="AiCineSynth — Visuals that move with the music">
<meta property="og:description" content="Audio-reactive WebGL worlds. Drop a track, watch it come alive.">
<meta property="og:type" content="website">
<style>
  :root{
    --ink:#f4f6fc; --muted:#aab0c6; --accent:#16f2ff; --accent2:#ff2d95;
    --sans:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    --mono:ui-monospace,"Cascadia Mono","SF Mono",Menlo,Consolas,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#04050a;color:var(--ink);font-family:var(--sans);overflow:hidden}

  /* THE VISUAL IS THE PAGE — full-bleed live hero */
  #stage{position:fixed;inset:0;z-index:0;background:#04050a}
  #stage iframe{position:absolute;inset:0;width:100%;height:100%;border:0;display:block}

  /* top bar */
  header{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;justify-content:space-between;
    padding:18px 24px;background:linear-gradient(180deg,rgba(4,5,10,.6),transparent);pointer-events:none}
  .brand{display:flex;align-items:center;gap:10px;pointer-events:auto}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent);animation:pulse 2.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
  .brand b{font-size:16px;letter-spacing:.14em;font-weight:800}
  .brand b span{color:var(--accent2)}
  header .right{display:flex;gap:8px;align-items:center;pointer-events:auto}
  header .tagline{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-right:6px}
  .fs{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink);
    border:1px solid rgba(255,255,255,.16);padding:8px 14px;border-radius:20px;text-decoration:none;transition:.2s;background:rgba(4,5,10,.4);backdrop-filter:blur(8px)}
  .fs:hover{border-color:var(--accent);color:#fff}

  /* WORLD SWITCHER — each visual takes the hero spot */
  #switcher{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:20;
    display:flex;gap:10px;padding:10px;border-radius:16px;
    background:rgba(6,7,14,.55);backdrop-filter:blur(16px) saturate(140%);border:1px solid rgba(255,255,255,.1);
    box-shadow:0 20px 60px rgba(0,0,0,.5)}
  .world{appearance:none;cursor:pointer;font:inherit;color:var(--muted);background:transparent;border:1px solid transparent;
    border-radius:11px;padding:9px 15px;font-size:12.5px;font-weight:600;letter-spacing:.02em;transition:.18s;white-space:nowrap;display:flex;flex-direction:column;align-items:center;gap:2px;line-height:1.1}
  .world small{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);opacity:.7}
  .world:hover{color:#fff;border-color:rgba(255,255,255,.14)}
  .world.active{color:#04121a;background:linear-gradient(180deg,var(--accent),#0bd6e6);border-color:transparent}
  .world.active small{color:rgba(4,18,26,.75)}

  /* first-load hint */
  #hint{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);z-index:19;
    font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);
    background:rgba(6,7,14,.5);backdrop-filter:blur(8px);padding:8px 16px;border-radius:20px;border:1px solid rgba(255,255,255,.08);
    transition:opacity .6s;pointer-events:none}
  #hint b{color:var(--accent2)}
  #hint.gone{opacity:0}

  footer{position:fixed;right:24px;bottom:30px;z-index:18;font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:rgba(170,176,198,.55);text-transform:uppercase;pointer-events:none}
  @media(max-width:680px){
    #switcher{gap:5px;padding:7px;bottom:18px;width:calc(100% - 24px);overflow-x:auto;justify-content:flex-start}
    .world{padding:8px 11px;font-size:11px}
    header .tagline{display:none}
    footer{display:none}
  }
</style>
</head>
<body>

<div id="stage">
  <iframe id="hero" src="modules/syncsynth-waveform-terrain.html" title="live audio-reactive visual" allow="microphone" loading="eager"></iframe>
</div>

<header>
  <div class="brand"><span class="dot"></span><b>AiCINE<span>SYNTH</span></b></div>
  <div class="right">
    <span class="tagline">Visuals that move with the music</span>
    <a class="fs" id="fsLink" href="modules/syncsynth-waveform-terrain.html" target="_blank" rel="noopener">Open ↗</a>
  </div>
</header>

<div id="hint">Drop a track or hit <b>the mic</b> inside the visual — it reacts live</div>

<nav id="switcher">
  <button class="world active" data-src="modules/syncsynth-waveform-terrain.html">Waveform Terrain<small>Synthwave</small></button>
  <button class="world" data-src="modules/liquid-metal-orb.html">Liquid Metal Orb<small>Showpiece</small></button>
  <button class="world" data-src="modules/syncsynth-cyber-tunnel.html">Cyber Tunnel<small>Hypnotic</small></button>
  <button class="world" data-src="modules/syncsynth-neon-particle-swarm.html">Particle Swarm<small>Organic</small></button>
</nav>

<footer>Powered by MirzaTech.ai · Property of EMAAA.io</footer>

<script>
  const hero = document.getElementById('hero');
  const fsLink = document.getElementById('fsLink');
  const worlds = document.querySelectorAll('.world');
  const hint = document.getElementById('hint');
  worlds.forEach(btn => btn.addEventListener('click', () => {
    const src = btn.dataset.src;
    if (hero.getAttribute('src') === src) return;
    worlds.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    hero.setAttribute('src', src);      // the chosen visual takes the full hero
    fsLink.setAttribute('href', src);
  }));
  // fade the hint after a bit
  setTimeout(() => hint.classList.add('gone'), 6000);
</script>
</body>
</html>
